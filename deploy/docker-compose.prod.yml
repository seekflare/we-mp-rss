services:
  app:
    image: ${WERSS_LOCAL_IMAGE}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        DOCKERHUB_MIRROR: ${DOCKERHUB_MIRROR}
        GHCR_MIRROR: ${GHCR_MIRROR}
        NPM_REGISTRY: ${NPM_REGISTRY}
    container_name: we-mp-rss-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      TZ: ${TZ}
      USERNAME: ${ADMIN_USERNAME}
      PASSWORD: ${ADMIN_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      PORT: 8001
      ENABLE_JOB: "True"
      AUTO_RELOAD: "False"
      THREADS: "1"
      WERSS_AUTH_WEB: "True"
      BROWSER_TYPE: webkit
      RSS_BASE_URL: ${RSS_SCHEME:-https}://${DOMAIN}/
    volumes:
      - ${PROJECT_ROOT}/runtime/data:/app/data
